name: Deploy GitHub Pages

on:
  push:
    branches: ["main", "JSPlayground2"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: VideoAudioImporter-cursor-javascript-playground-packages-a747/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: VideoAudioImporter-cursor-javascript-playground-packages-a747

      - name: Build app
        run: npm run build
        working-directory: VideoAudioImporter-cursor-javascript-playground-packages-a747

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: VideoAudioImporter-cursor-javascript-playground-packages-a747/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
